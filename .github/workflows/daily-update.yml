name: 🤖 RoboDeals Daily Update

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install requests openai

      - name: 🚀 Run pipeline
        env:
          ALIEXPRESS_APP_KEY:     ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET:  ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          SITE_URL:               ${{ secrets.SITE_URL }}
        run: python scripts/fetch_and_build.py

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || \
            git commit -m "🤖 Daily update $(date -u +'%Y-%m-%d') — 100 new products"
          git push
