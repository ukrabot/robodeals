name: 🤖 RoboDeals Daily Update

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 07:00 Chile (horario verano)
  workflow_dispatch:        # Permite ejecución manual desde GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # 100 productos con GPT puede tardar ~30-45 min

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run pipeline
        env:
          # AliExpress Affiliates
          ALIEXPRESS_APP_KEY:     ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET:  ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          # Cloudflare R2
          CF_ACCOUNT_ID:          ${{ secrets.CF_ACCOUNT_ID }}
          CF_R2_ACCESS_KEY:       ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY:       ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET:           ${{ secrets.CF_R2_BUCKET }}
          CF_R2_PUBLIC_URL:       ${{ secrets.CF_R2_PUBLIC_URL }}
          # OpenAI
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          # Site
          SITE_URL:               ${{ secrets.SITE_URL }}
        run: python scripts/fetch_and_build.py

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || \
            git commit -m "🤖 Daily update $(date -u +'%Y-%m-%d') — 100 new products"
          git push
